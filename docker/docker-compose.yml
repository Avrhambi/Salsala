services:
  db:
    image: postgis/postgis:16-3.4
    restart: unless-stopped
    environment:
      POSTGRES_DB: salsala
      POSTGRES_USER: salsala
      POSTGRES_PASSWORD: salsala_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U salsala -d salsala"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://salsala:salsala_dev@db:5432/salsala
      APP_SECRET_KEY: dev_secret_change_in_production
      LOG_LEVEL: INFO
      STORAGE_BASE_PATH: /storage
    ports:
      - "8000:8000"
    volumes:
      - storage_data:/storage

volumes:
  postgres_data:
  storage_data:
